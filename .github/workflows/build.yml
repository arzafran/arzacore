# Consolidated build for all arzacore cores.
#
# - Push / PR: builds only the cores whose cores/<name>/ files changed
#   (or all cores if shared scripts/CI changed).
# - workflow_dispatch: build a chosen core, or all.
# - Tag <core>-vX.Y.Z (e.g. nes-v1.0.0): builds that core and publishes a Release.
#
# SNES builds its three variants (main/pal/spc) in parallel, then a package job
# assembles them into one core zip. Other cores build in a single job.
# Quartus runs from a GHCR mirror of raetro/quartus:21.1 (faster, no Docker Hub
# rate limits); mirror it once with the mirror-quartus workflow.
name: build

on:
  workflow_dispatch:
    inputs:
      core:
        description: "core to build (all | gbc | nes | snes | genesis | gba)"
        default: all
      version:
        description: "set to publish Release(s), e.g. 1.0.1 (blank = build only). Robust to multi-core release in one run."
        default: ""
  push:
    branches: [main]
    tags: ["*-v[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:

permissions:
  contents: write
  packages: read

env:
  QUARTUS_IMAGE: ghcr.io/arzafran/quartus:21.1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cores: ${{ steps.set.outputs.cores }}   # non-snes cores to build (JSON array)
      snes: ${{ steps.set.outputs.snes }}      # "true"/"false"
    steps:
      - uses: actions/checkout@v5
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            gbc: ['cores/gbc/**']
            nes: ['cores/nes/**']
            snes: ['cores/snes/**']
            genesis: ['cores/genesis/**']
            gba: ['cores/gba/**']
            shared: ['scripts/**']
      - id: set
        run: |
          ALL='["gbc","nes","genesis","gba"]'
          ev='${{ github.event_name }}'
          if [ "$ev" = "workflow_dispatch" ]; then
            case '${{ github.event.inputs.core }}' in
              all)  echo "cores=$ALL" >>"$GITHUB_OUTPUT"; echo "snes=true"  >>"$GITHUB_OUTPUT" ;;
              snes) echo "cores=[]"   >>"$GITHUB_OUTPUT"; echo "snes=true"  >>"$GITHUB_OUTPUT" ;;
              *)    echo 'cores=["${{ github.event.inputs.core }}"]' >>"$GITHUB_OUTPUT"; echo "snes=false" >>"$GITHUB_OUTPUT" ;;
            esac
            exit 0
          fi
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            c="${GITHUB_REF_NAME%%-v*}"
            if [ "$c" = "snes" ]; then echo "cores=[]" >>"$GITHUB_OUTPUT"; echo "snes=true" >>"$GITHUB_OUTPUT"
            else echo "cores=[\"$c\"]" >>"$GITHUB_OUTPUT"; echo "snes=false" >>"$GITHUB_OUTPUT"; fi
            exit 0
          fi
          if [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            echo "cores=$ALL" >>"$GITHUB_OUTPUT"; echo "snes=true" >>"$GITHUB_OUTPUT"; exit 0
          fi
          sel=""
          [ "${{ steps.filter.outputs.gbc }}" = "true" ]     && sel="$sel\"gbc\","
          [ "${{ steps.filter.outputs.nes }}" = "true" ]     && sel="$sel\"nes\","
          [ "${{ steps.filter.outputs.genesis }}" = "true" ] && sel="$sel\"genesis\","
          [ "${{ steps.filter.outputs.gba }}" = "true" ]     && sel="$sel\"gba\","
          echo "cores=[${sel%,}]" >>"$GITHUB_OUTPUT"
          echo "snes=${{ steps.filter.outputs.snes }}" >>"$GITHUB_OUTPUT"

  build:
    needs: changes
    if: needs.changes.outputs.cores != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        core: ${{ fromJSON(needs.changes.outputs.cores) }}
    steps:
      - uses: actions/checkout@v5
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with: { tool-cache: false, android: true, dotnet: true, haskell: false, large-packages: false, docker-images: true, swap-storage: false }
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build ${{ matrix.core }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then VER="pr-${{ github.event.number }}"; elif [ -n "${{ github.event.inputs.version }}" ]; then VER="${{ github.event.inputs.version }}"; else VER="${GITHUB_REF_NAME//\//-}"; fi
          bash scripts/build_core.sh "${{ matrix.core }}" "${VER:-dev}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.core }}
          path: cores/${{ matrix.core }}/_dist/*.zip
      - name: Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('{0}-v{1}', matrix.core, github.event.inputs.version) || github.ref_name }}
          files: cores/${{ matrix.core }}/_dist/*.zip

  build-snes:
    needs: changes
    if: needs.changes.outputs.snes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [main, pal, spc]
    steps:
      - uses: actions/checkout@v5
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with: { tool-cache: false, android: true, dotnet: true, haskell: false, large-packages: false, docker-images: true, swap-storage: false }
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build SNES ${{ matrix.variant }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then VER="pr-${{ github.event.number }}"; elif [ -n "${{ github.event.inputs.version }}" ]; then VER="${{ github.event.inputs.version }}"; else VER="${GITHUB_REF_NAME//\//-}"; fi
          bash scripts/build_snes_variant.sh "${{ matrix.variant }}" "${VER:-dev}"
      - uses: actions/upload-artifact@v7
        with:
          name: snes-rev-${{ matrix.variant }}
          path: cores/snes/pkg/Cores/arzacore.SNES/snes_${{ matrix.variant }}.rev
      - name: Upload timing + fit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snes-reports-${{ matrix.variant }}
          path: |
            cores/snes/projects/output_files/*.sta.summary
            cores/snes/projects/output_files/*.fit.summary
      - name: Timing regression gate
        run: >
          python3 scripts/check_snes_timing.py --check ${{ matrix.variant }}
          cores/snes/projects/output_files/snes_pocket.sta.summary

  package-snes:
    needs: [changes, build-snes]
    if: ${{ needs.changes.outputs.snes == 'true' && needs.build-snes.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download variant bitstreams
        uses: actions/download-artifact@v7
        with:
          pattern: snes-rev-*
          path: snes-revs
          merge-multiple: true
      - name: Assemble and package SNES core
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then VER="pr-${{ github.event.number }}"; elif [ -n "${{ github.event.inputs.version }}" ]; then VER="${{ github.event.inputs.version }}"; else VER="${GITHUB_REF_NAME//\//-}"; fi
          VER="${VER:-dev}"
          mkdir -p cores/snes/pkg/Cores/arzacore.SNES cores/snes/_dist
          cp snes-revs/*.rev cores/snes/pkg/Cores/arzacore.SNES/
          ( cd cores/snes/pkg && zip -qr "$GITHUB_WORKSPACE/cores/snes/_dist/arzacore.SNES_${VER}.zip" Assets Cores Platforms )
          ls -la cores/snes/_dist/
      - uses: actions/upload-artifact@v7
        with:
          name: snes
          path: cores/snes/_dist/*.zip
      - name: Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('snes-v{0}', github.event.inputs.version) || github.ref_name }}
          files: cores/snes/_dist/*.zip
