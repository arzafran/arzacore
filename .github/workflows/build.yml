# Consolidated build for all arzacore cores.
#
# - Push / PR: builds only the cores whose cores/<name>/ files changed
#   (or all cores if shared scripts/CI changed).
# - workflow_dispatch: build a chosen core, or all.
# - Tag <core>-vX.Y.Z (e.g. nes-v1.0.0): builds that core and publishes a Release.
#
# Each core is compiled by scripts/build_core.sh in the raetro/quartus:21.1 image.
name: build

on:
  workflow_dispatch:
    inputs:
      core:
        description: "core to build (all | gbc | nes | snes | genesis | gba)"
        default: all
  push:
    branches: [main]
    tags: ["*-v[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gbc: ['cores/gbc/**']
            nes: ['cores/nes/**']
            snes: ['cores/snes/**']
            genesis: ['cores/genesis/**']
            gba: ['cores/gba/**']
            shared: ['scripts/**', '.github/**']
      - id: set
        run: |
          ALL='["gbc","nes","snes","genesis","gba"]'
          ev='${{ github.event_name }}'
          if [ "$ev" = "workflow_dispatch" ]; then
            inp='${{ github.event.inputs.core }}'
            if [ "$inp" = "all" ]; then echo "matrix={\"core\":$ALL}" >> "$GITHUB_OUTPUT"
            else echo "matrix={\"core\":[\"$inp\"]}" >> "$GITHUB_OUTPUT"; fi
            exit 0
          fi
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo "matrix={\"core\":[\"${GITHUB_REF_NAME%%-v*}\"]}" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            echo "matrix={\"core\":$ALL}" >> "$GITHUB_OUTPUT"; exit 0
          fi
          sel=""
          [ "${{ steps.filter.outputs.gbc }}" = "true" ]     && sel="$sel\"gbc\","
          [ "${{ steps.filter.outputs.nes }}" = "true" ]     && sel="$sel\"nes\","
          [ "${{ steps.filter.outputs.snes }}" = "true" ]    && sel="$sel\"snes\","
          [ "${{ steps.filter.outputs.genesis }}" = "true" ] && sel="$sel\"genesis\","
          [ "${{ steps.filter.outputs.gba }}" = "true" ]     && sel="$sel\"gba\","
          echo "matrix={\"core\":[${sel%,}]}" >> "$GITHUB_OUTPUT"

  build:
    needs: changes
    if: needs.changes.outputs.matrix != '{"core":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
      - name: Build ${{ matrix.core }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then VER="pr-${{ github.event.number }}"
          else VER="${GITHUB_REF_NAME//\//-}"; fi
          bash scripts/build_core.sh "${{ matrix.core }}" "${VER:-dev}"
      - name: Upload core zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.core }}
          path: cores/${{ matrix.core }}/_dist/*.zip
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cores/${{ matrix.core }}/_dist/*.zip
